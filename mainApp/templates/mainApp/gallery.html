{% extends 'mainApp/base.html' %}
{% load static %}

{% block title %}Gallery{% endblock %}

<!-- Image Gallery Start -->
<style>
    .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
    }
    .gallery-item img {
        transition: transform 0.3s ease;
    }
    .gallery-item:hover img {
        transform: scale(1.1);
    }
    .gallery-item .zoom-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.3s ease;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .gallery-item:hover .zoom-icon {
        opacity: 1;
    }
    .zoom-icon i {
        color: white;
        font-size: 24px;
    }
</style>
